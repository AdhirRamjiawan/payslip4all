AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy Payslip4All behind a YARP gateway on a single EC2 instance with an Elastic IP and DynamoDB persistence.

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Environment identifier used in resource names and tags.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC that hosts the Payslip4All web instance.
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Existing public subnet with internet access for the Payslip4All web instance.
  InstanceType:
    Type: String
    Default: t3.micro
    Description: Low-cost default instance type; override only when required.
  ArtifactSource:
    Type: String
    Description: HTTPS or S3-backed artifact URL for the published Payslip4All deployment bundle.
  DynamoDbTablePrefix:
    Type: String
    Default: payslip4all
    Description: Prefix used by the application-owned DynamoDB tables.
  AppConfigSecretArn:
    Type: String
    Default: ''
    Description: Optional Secrets Manager ARN that stores flat ASP.NET Core app-configuration keys in JSON form.
  HostedPaymentsSecretArn:
    Type: String
    Default: ''
    Description: Optional legacy Secrets Manager ARN that appends direct environment-style overrides into the service environment file.
  TlsCertificateSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN whose SecretString JSON contains fullchainPem and privkeyPem values that bootstrap converts into the YARP TLS certificate.

Resources:
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ingress for the Payslip4All YARP gateway host.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub payslip4all-web-sg-${EnvironmentName}

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub payslip4all-web-${EnvironmentName}
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:CreateTable
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeContinuousBackups
                  - dynamodb:DescribeTable
                  - dynamodb:GetItem
                  - dynamodb:ListTables
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:RestoreTableToPointInTime
                  - dynamodb:Scan
                  - dynamodb:UpdateContinuousBackups
                  - dynamodb:UpdateItem
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - !If
                - HasAppConfigSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref AppConfigSecretArn
                - !Ref AWS::NoValue
              - !If
                - HasHostedPaymentsSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref HostedPaymentsSecretArn
                - !Ref AWS::NoValue
              - !If
                - HasTlsCertificateSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref TlsCertificateSecretArn
                - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub payslip4all-web-role-${EnvironmentName}

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppInstanceRole

  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref AppInstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: '0'
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId: !Ref SubnetId
      MetadataOptions:
        HttpTokens: required
      UserData:
        Fn::Base64: !Sub |
          #!/usr/bin/env bash
          set -euo pipefail
          APP_ROOT="/opt/payslip4all"
          APP_USER="payslip4all"
          ENV_DIR="/etc/payslip4all"
          APP_ENV_FILE="$ENV_DIR/payslip4all.env"
          GATEWAY_ENV_FILE="$ENV_DIR/payslip4all-gateway.env"
          APP_CONFIG_SECRETS_FILE="/etc/payslip4all/app-config.secrets.json"
          APP_SERVICE_FILE="/etc/systemd/system/payslip4all.service"
          GATEWAY_SERVICE_FILE="/etc/systemd/system/payslip4all-gateway.service"
          TLS_CERT_DIR="/etc/payslip4all/certs"
          TLS_FULLCHAIN_PATH="/etc/payslip4all/certs/fullchain.pem"
          TLS_PRIVATE_KEY_PATH="/etc/payslip4all/certs/privkey.pem"
          TLS_PFX_PATH="/etc/payslip4all/certs/payslip4all.pfx"
          PUBLIC_DOMAIN="payslip4all.co.za"
          UPSTREAM_APP_URL="http://127.0.0.1:8080"
          PUBLIC_EDGE_URLS="http://0.0.0.0:80;https://0.0.0.0:443"
          dnf install -y curl tar gzip jq awscli aspnetcore-runtime-8.0 openssl
          if ! id "$APP_USER" >/dev/null 2>&1; then
            useradd --system --home "$APP_ROOT" --shell /sbin/nologin "$APP_USER"
          fi
          mkdir -p "$APP_ROOT" "$ENV_DIR" "$TLS_CERT_DIR"
          install -m 0600 /dev/null "$APP_ENV_FILE"
          install -m 0600 /dev/null "$GATEWAY_ENV_FILE"
          curl --fail --location --silent --show-error "${ArtifactSource}" --output /tmp/payslip4all.tgz
          find "$APP_ROOT" -mindepth 1 -exec rm -rf -- {} +
          tar -xzf /tmp/payslip4all.tgz -C "$APP_ROOT"
          cat > "$APP_ENV_FILE" <<EOF
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://127.0.0.1:8080
          PERSISTENCE_PROVIDER=dynamodb
          DYNAMODB_REGION=${AWS::Region}
          DYNAMODB_TABLE_PREFIX=${DynamoDbTablePrefix}
          DYNAMODB_ENABLE_PITR=true
          EOF
          if [[ -n "${HostedPaymentsSecretArn}" ]]; then
            aws secretsmanager get-secret-value --secret-id "${HostedPaymentsSecretArn}" --query SecretString --output text | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$APP_ENV_FILE"
          fi
          rm -f "$APP_CONFIG_SECRETS_FILE"
          if [[ -n "${AppConfigSecretArn}" ]]; then
            APP_CONFIG_JSON="$(aws secretsmanager get-secret-value --secret-id "${AppConfigSecretArn}" --query SecretString --output text)"
            printf '%s' "$APP_CONFIG_JSON" | jq -e 'if type == "object" then . else error("App config secret must be a JSON object.") end' > "$APP_CONFIG_SECRETS_FILE"
            chmod 600 "$APP_CONFIG_SECRETS_FILE"
            chown "$APP_USER:$APP_USER" "$APP_CONFIG_SECRETS_FILE"
          fi
          if [[ -z "${TlsCertificateSecretArn}" ]]; then
            echo "TlsCertificateSecretArn must reference a Secrets Manager secret containing fullchainPem and privkeyPem." >&2
            exit 1
          fi
          CERTIFICATE_ACTIVATION_ERROR="HTTPS activation failed for payslip4all.co.za: certificate material is missing or invalid; public traffic remains disabled."
          CERTIFICATE_JSON="$(aws secretsmanager get-secret-value --secret-id "${TlsCertificateSecretArn}" --query SecretString --output text)"
          printf '%s' "$CERTIFICATE_JSON" | jq -r '.fullchainPem' > "$TLS_FULLCHAIN_PATH"
          printf '%s' "$CERTIFICATE_JSON" | jq -r '.privkeyPem' > "$TLS_PRIVATE_KEY_PATH"
          if [[ ! -s "$TLS_FULLCHAIN_PATH" || ! -s "$TLS_PRIVATE_KEY_PATH" || "$(cat "$TLS_FULLCHAIN_PATH")" == "null" || "$(cat "$TLS_PRIVATE_KEY_PATH")" == "null" ]]; then
            echo "$CERTIFICATE_ACTIVATION_ERROR" >&2
            exit 1
          fi
          TLS_PFX_PASSWORD="$(openssl rand -hex 24)"
          if ! openssl pkcs12 -export -out "$TLS_PFX_PATH" -inkey "$TLS_PRIVATE_KEY_PATH" -in "$TLS_FULLCHAIN_PATH" -password "pass:${TLS_PFX_PASSWORD}"; then
            echo "$CERTIFICATE_ACTIVATION_ERROR" >&2
            exit 1
          fi
          cat > "$GATEWAY_ENV_FILE" <<EOF
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://0.0.0.0:80;https://0.0.0.0:443
          REVERSE_PROXY_ENABLED=true
          REVERSE_PROXY_PUBLIC_HOST=payslip4all.co.za
          REVERSE_PROXY_UPSTREAM_BASE_URL=http://127.0.0.1:8080
          REVERSE_PROXY_ACTIVITY_TIMEOUT_SECONDS=10
          Kestrel__Certificates__Default__Path=/etc/payslip4all/certs/payslip4all.pfx
          Kestrel__Certificates__Default__Password=${TLS_PFX_PASSWORD}
          EOF
          chmod 600 "$APP_ENV_FILE" "$GATEWAY_ENV_FILE" "$TLS_PRIVATE_KEY_PATH" "$TLS_PFX_PATH"
          chmod 644 "$TLS_FULLCHAIN_PATH"
          cat > "$APP_SERVICE_FILE" <<EOF
          [Unit]
          Description=Payslip4All web application
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=$APP_USER
          WorkingDirectory=$APP_ROOT
          EnvironmentFile=$APP_ENV_FILE
          ExecStart=/usr/bin/dotnet $APP_ROOT/Payslip4All.Web.dll
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF
          cat > "$GATEWAY_SERVICE_FILE" <<EOF
          [Unit]
          Description=Payslip4All YARP gateway
          After=network-online.target payslip4all.service
          Wants=network-online.target

          [Service]
          Type=simple
          User=$APP_USER
          WorkingDirectory=$APP_ROOT
          EnvironmentFile=$GATEWAY_ENV_FILE
          ExecStart=/usr/bin/dotnet $APP_ROOT/Payslip4All.Web.dll
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF
          chown -R "$APP_USER:$APP_USER" "$APP_ROOT" "$ENV_DIR" "$TLS_CERT_DIR"
          systemctl daemon-reload
          systemctl enable payslip4all.service
          systemctl enable payslip4all-gateway.service
          systemctl restart payslip4all.service
          systemctl is-active --quiet payslip4all.service
          systemctl restart payslip4all-gateway.service
          systemctl is-active --quiet payslip4all-gateway.service
      Tags:
        - Key: Name
          Value: !Sub payslip4all-web-${EnvironmentName}

  ElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref WebInstance
      Tags:
        - Key: Name
          Value: !Sub payslip4all-web-eip-${EnvironmentName}

Conditions:
  HasAppConfigSecret: !Not [!Equals [!Ref AppConfigSecretArn, '']]
  HasHostedPaymentsSecret: !Not [!Equals [!Ref HostedPaymentsSecretArn, '']]
  HasTlsCertificateSecret: !Not [!Equals [!Ref TlsCertificateSecretArn, '']]

Outputs:
  ApplicationUrl:
    Description: Public HTTPS URL for Payslip4All.
    Value: https://payslip4all.co.za
  ElasticIpAddress:
    Description: Elastic IP address assigned to the EC2 instance.
    Value: !Ref ElasticIp
  InstanceId:
    Description: The EC2 instance serving Payslip4All.
    Value: !Ref WebInstance
  InstanceSecurityGroupId:
    Description: EC2 security group for network troubleshooting.
    Value: !Ref InstanceSecurityGroup
  SsmStartSessionCommand:
    Description: AWS CLI command to open an SSM shell on the instance.
    Value: !Sub aws ssm start-session --target ${WebInstance}
  AppConfigSecretReference:
    Description: Secret reference used for the rendered custom app-configuration JSON artifact.
    Value: !If
      - HasAppConfigSecret
      - !Ref AppConfigSecretArn
      - no-app-config-secret-configured
  AppConfigSecretsFilePath:
    Description: Rendered custom app-configuration artifact path on the instance.
    Value: /etc/payslip4all/app-config.secrets.json
  HostedPaymentsSecretReference:
    Description: Legacy secret reference used for direct environment-style override injection.
    Value: !If
      - HasHostedPaymentsSecret
      - !Ref HostedPaymentsSecretArn
      - no-external-secret-configured
  TlsCertificateSecretReference:
    Description: Secret reference used to stage YARP TLS certificate material on the host.
    Value: !If
      - HasTlsCertificateSecret
      - !Ref TlsCertificateSecretArn
      - no-tls-secret-configured
  GatewayServiceName:
    Description: Public-edge YARP systemd service name.
    Value: payslip4all-gateway.service
  BackupProtectionMode:
    Description: DynamoDB backup protection mode for hosted AWS.
    Value: point-in-time recovery via hosted service
  RestoreRunbook:
    Description: Operator restore reference.
    Value: infra/aws/cloudformation/README.md#dynamodb-backup-and-restore
